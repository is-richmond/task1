<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova — Дашборд заказов</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f7ff;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #6c63ff 0%, #a855f7 100%);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }
    #lastUpdated { font-size: 0.8rem; opacity: 0.7; text-align: right; }

    main { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .kpi {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(108,99,255,0.08);
      border-left: 4px solid #6c63ff;
      transition: transform 0.2s;
    }
    .kpi:hover { transform: translateY(-2px); }
    .kpi:nth-child(2) { border-color: #a855f7; }
    .kpi:nth-child(3) { border-color: #ec4899; }
    .kpi:nth-child(4) { border-color: #f59e0b; }
    .kpi-value { font-size: 2rem; font-weight: 800; color: #1a1a2e; line-height: 1; }
    .kpi-label { font-size: 0.8rem; color: #6b7280; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(108,99,255,0.08);
    }
    .card h2 { font-size: 1rem; font-weight: 600; color: #374151; margin-bottom: 20px; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      background: #f3f0ff;
      color: #6c63ff;
      font-weight: 600;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf9ff; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-new      { background: #dbeafe; color: #1d4ed8; }
    .badge-complete { background: #d1fae5; color: #065f46; }
    .badge-processing { background: #fef3c7; color: #92400e; }

    .loading {
      text-align: center;
      padding: 60px;
      color: #9ca3af;
      font-size: 1.1rem;
    }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .utm-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }
    .utm-bar-name { width: 80px; color: #374151; flex-shrink: 0; }
    .utm-bar-track { flex: 1; background: #f3f0ff; border-radius: 8px; height: 10px; }
    .utm-bar-fill { background: linear-gradient(90deg, #6c63ff, #a855f7); height: 10px; border-radius: 8px; transition: width 0.6s; }
    .utm-bar-count { width: 40px; text-align: right; color: #6b7280; font-size: 0.8rem; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Nova Shapewear — Дашборд</h1>
    <p>Аналитика заказов в реальном времени</p>
  </div>
  <div id="lastUpdated">Загрузка...</div>
</header>

<main>
  <div id="loading" class="loading">
    <div><div class="spinner"></div></div>
    <div>Загружаем данные из Supabase...</div>
  </div>

  <div id="content" style="display:none">
    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-value" id="kpiOrders">—</div>
        <div class="kpi-label">Всего заказов</div>
      </div>
      <div class="kpi">
        <div class="kpi-value" id="kpiRevenue">—</div>
        <div class="kpi-label">Выручка (₸)</div>
      </div>
      <div class="kpi">
        <div class="kpi-value" id="kpiAvg">—</div>
        <div class="kpi-label">Средний чек (₸)</div>
      </div>
      <div class="kpi">
        <div class="kpi-value" id="kpiCities">—</div>
        <div class="kpi-label">Городов</div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="charts-grid">
      <div class="card">
        <h2>📈 Выручка по дням</h2>
        <canvas id="revenueChart" height="220"></canvas>
      </div>
      <div class="card">
        <h2>🏙️ Города</h2>
        <canvas id="cityChart" height="220"></canvas>
      </div>
    </div>

    <!-- UTM + Table -->
    <div class="charts-grid">
      <div class="card">
        <h2>🛒 Последние заказы</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>№</th>
                <th>Клиент</th>
                <th>Город</th>
                <th>Сумма</th>
                <th>UTM</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody id="ordersTable"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <h2>📣 Источники трафика</h2>
        <div id="utmBars"></div>
      </div>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://mudmipuwcfcgsgqxuahj.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZG1pcHV3Y2ZjZ3NncXh1YWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjUzNDgsImV4cCI6MjA5MTMwMTM0OH0.n47QVNAHDGCZrGn6SB-L14fTOs-9ZMK1MgQY52ePsEo";

  async function fetchOrders() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc&limit=500`,
      { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  function fmt(num) {
    return Math.round(num).toLocaleString("ru-RU");
  }

  function badgeClass(status) {
    if (status === "complete") return "badge-complete";
    if (status === "processing") return "badge-processing";
    return "badge-new";
  }

  function renderUTM(orders) {
    const counts = {};
    orders.forEach(o => {
      const src = o.utm_source || "direct";
      counts[src] = (counts[src] || 0) + 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const max = sorted[0]?.[1] || 1;
    const container = document.getElementById("utmBars");
    container.innerHTML = sorted.map(([src, count]) => `
      <div class="utm-bar">
        <div class="utm-bar-name">${src}</div>
        <div class="utm-bar-track">
          <div class="utm-bar-fill" style="width:${(count/max*100).toFixed(0)}%"></div>
        </div>
        <div class="utm-bar-count">${count}</div>
      </div>
    `).join("");
  }

  async function init() {
    try {
      const orders = await fetchOrders();

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";

      // KPI
      const totalRevenue = orders.reduce((s, o) => s + (o.total || 0), 0);
      const cities = new Set(orders.map(o => o.city).filter(Boolean)).size;
      document.getElementById("kpiOrders").textContent = orders.length;
      document.getElementById("kpiRevenue").textContent = fmt(totalRevenue);
      document.getElementById("kpiAvg").textContent = orders.length ? fmt(totalRevenue / orders.length) : "0";
      document.getElementById("kpiCities").textContent = cities;
      document.getElementById("lastUpdated").textContent =
        "Обновлено: " + new Date().toLocaleTimeString("ru-RU");

      // Revenue by day chart
      const byDay = {};
      [...orders].reverse().forEach(o => {
        const day = (o.created_at || "").slice(0, 10);
        if (day) byDay[day] = (byDay[day] || 0) + (o.total || 0);
      });
      new Chart(document.getElementById("revenueChart"), {
        type: "bar",
        data: {
          labels: Object.keys(byDay),
          datasets: [{
            label: "₸",
            data: Object.values(byDay),
            backgroundColor: "rgba(108,99,255,0.7)",
            borderRadius: 6
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { callback: v => fmt(v) + " ₸" } },
            x: { ticks: { maxRotation: 45 } }
          }
        }
      });

      // City doughnut
      const byCity = {};
      orders.forEach(o => { if (o.city) byCity[o.city] = (byCity[o.city] || 0) + 1; });
      new Chart(document.getElementById("cityChart"), {
        type: "doughnut",
        data: {
          labels: Object.keys(byCity),
          datasets: [{
            data: Object.values(byCity),
            backgroundColor: ["#6c63ff","#a855f7","#ec4899","#f59e0b","#10b981","#3b82f6"]
          }]
        },
        options: { plugins: { legend: { position: "bottom" } } }
      });

      // Table (last 15)
      const tbody = document.getElementById("ordersTable");
      orders.slice(0, 15).forEach(o => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><b>${o.number || "—"}</b></td>
          <td>${o.first_name || ""} ${o.last_name || ""}</td>
          <td>${o.city || "—"}</td>
          <td><b>${fmt(o.total)} ₸</b></td>
          <td>${o.utm_source || "direct"}</td>
          <td><span class="badge ${badgeClass(o.status)}">${o.status}</span></td>
        `;
        tbody.appendChild(tr);
      });

      // UTM bars
      renderUTM(orders);

    } catch (err) {
      document.getElementById("loading").innerHTML =
        `<div style="color:#ef4444">❌ Ошибка загрузки: ${err.message}<br><small>Проверь, что таблица orders создана в Supabase</small></div>`;
    }
  }

  init();
  setInterval(init, 60000); // обновляем каждую минуту
</script>
</body>
</html>
